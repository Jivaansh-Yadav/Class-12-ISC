<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ISC.exe | Resources</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080a0d;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.06);
  --glass:rgba(255,255,255,0.03);--glass-border:rgba(255,255,255,0.08);
  --accent:#3bff6c;--accent-lo:rgba(59,255,108,0.06);--accent-md:rgba(59,255,108,0.15);
  --fg:#f0f4fa;--fg2:#8b9cb5;--fg3:#4a5a72;
  --nav-h:0px;
}
html,body{height:100%;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
body{
  background:var(--bg);color:var(--fg);
  font-family:'Space Grotesk',system-ui,sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;top:-40%;left:-20%;width:140%;height:80%;
  background:radial-gradient(ellipse at 30% 50%, rgba(59,255,108,0.03) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:32px 32px;
}

/* ─── LAYOUT ─── */
.app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100vh;height:100dvh;
}

/* ─── HEADER ─── */
.header{
  flex-shrink:0;padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--glass-border);
  background:rgba(8,10,13,0.8);
  backdrop-filter:blur(20px);
}
.brand{
  font-family:'DM Mono',monospace;font-weight:500;font-size:13px;
  color:var(--fg);display:flex;align-items:center;gap:7px;
}
.brand-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}
.brand span{color:var(--accent);}
.header-right{font-family:'DM Mono',monospace;font-size:9px;color:var(--fg3);letter-spacing:1.5px;text-transform:uppercase;}

/* ─── STREAM PILLS ─── */
.streams{
  flex-shrink:0;display:flex;gap:8px;padding:12px 16px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.streams::-webkit-scrollbar{display:none;}
.stream-pill{
  flex-shrink:0;display:flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:12px;
  border:1px solid var(--glass-border);
  background:var(--glass);
  backdrop-filter:blur(10px);
  font-size:13px;font-weight:500;color:var(--fg2);
  cursor:pointer;transition:all .25s cubic-bezier(.22,1,.36,1);
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.stream-pill:active{transform:scale(0.95);}
.stream-pill.active{border-color:var(--pill-color);color:var(--pill-color);background:color-mix(in srgb, var(--pill-color) 8%, transparent);}
.stream-dot{width:6px;height:6px;border-radius:50%;background:var(--pill-color);transition:box-shadow .2s;}
.stream-pill.active .stream-dot{box-shadow:0 0 8px var(--pill-color);}

/* ─── SEARCH ─── */
.search-wrap{flex-shrink:0;padding:8px 16px 10px;}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:12px;padding:10px 14px;
  transition:border-color .2s;
}
.search-box:focus-within{border-color:rgba(59,255,108,0.3);}
.search-ico{color:var(--fg3);font-size:14px;flex-shrink:0;}
.search-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--fg);font-family:inherit;font-size:14px;
}
.search-input::placeholder{color:var(--fg3);opacity:.6;}
.search-clear{
  background:none;border:none;color:var(--fg3);font-size:16px;
  cursor:pointer;padding:0 4px;display:none;
  touch-action:manipulation;
}
.search-clear.visible{display:block;}

/* ─── SUBJECT LIST ─── */
.subjects{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:4px 12px;
  padding-bottom:calc(70px + env(safe-area-inset-bottom,0px));
}
.subjects::-webkit-scrollbar{display:none;}

.subject{margin-bottom:4px;border-radius:12px;overflow:hidden;}
.subject-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:12px;
  border-left:3px solid var(--subj-color);
  background:color-mix(in srgb, var(--subj-color) 5%, transparent);
  cursor:pointer;transition:all .2s;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.subject-header:active{transform:scale(0.98);}
.subject.open .subject-header{
  background:color-mix(in srgb, var(--subj-color) 10%, transparent);
  border-radius:12px 12px 0 0;
}
.subject-icon{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;flex-shrink:0;font-size:14px;
  background:color-mix(in srgb, var(--subj-color) 12%, transparent);
  color:var(--subj-color);font-weight:700;
}
.subject-name{flex:1;font-size:14px;font-weight:500;color:var(--fg);transition:color .2s;}
.subject.open .subject-name{color:var(--subj-color);}
.subject-count{
  font-family:'DM Mono',monospace;font-size:9px;
  padding:2px 8px;border-radius:10px;
  background:color-mix(in srgb, var(--subj-color) 12%, transparent);
  color:var(--subj-color);
  border:1px solid color-mix(in srgb, var(--subj-color) 25%, transparent);
}
.subject-arrow{
  font-size:7px;color:var(--subj-color);opacity:0.6;
  transition:transform .25s cubic-bezier(.22,1,.36,1);flex-shrink:0;
}
.subject.open .subject-arrow{transform:rotate(90deg);opacity:1;}

/* Files */
.file-list{display:none;padding:4px 8px 8px 20px;}
.subject.open .file-list{display:block;}

.folder-toggle{
  display:flex;align-items:center;gap:6px;
  padding:8px 10px;border-radius:8px;width:100%;
  background:none;border:none;cursor:pointer;
  font-family:inherit;font-size:13px;color:var(--fg);
  transition:background .15s;text-align:left;
  touch-action:manipulation;
}
.folder-toggle:active{background:var(--surface2);}
.folder-toggle svg{opacity:0.4;flex-shrink:0;}
.folder-arrow{font-size:6px;color:var(--fg3);margin-left:auto;transition:transform .2s;}
.folder-toggle.open .folder-arrow{transform:rotate(90deg);}
.folder-children{display:none;padding-left:12px;}
.folder-toggle.open + .folder-children{display:block;}

.file-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:all .15s;
  border:1px solid transparent;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.file-item:active{transform:scale(0.98);background:var(--surface2);}
.file-item.active{background:var(--accent-lo);border-color:rgba(59,255,108,0.2);}
.file-badge{
  font-family:'DM Mono',monospace;font-size:8px;font-weight:600;
  padding:2px 6px;border-radius:4px;flex-shrink:0;
  text-transform:uppercase;letter-spacing:0.5px;
}
.badge-pdf{background:rgba(212,160,106,0.15);color:#d4a06a;border:1px solid rgba(212,160,106,0.2);}
.badge-doc{background:rgba(122,171,204,0.15);color:#7aabcc;border:1px solid rgba(122,171,204,0.2);}
.badge-def{background:var(--surface2);color:var(--fg2);border:1px solid var(--glass-border);}
.file-name{
  flex:1;font-size:13px;color:var(--fg2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  min-width:0;line-height:1.3;transition:color .15s;
}
.file-item:active .file-name,.file-item.active .file-name{color:var(--fg);}

/* ─── VIEWER OVERLAY ─── */
.viewer{
  position:fixed;inset:0;z-index:500;
  background:var(--bg);
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;
  will-change:transform;
}
.viewer.open{transform:translateX(0);}

.viewer-header{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  background:rgba(8,10,13,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
}
.viewer-back{
  display:flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:10px;
  background:var(--accent-lo);
  border:1px solid rgba(59,255,108,0.25);
  color:var(--accent);font-size:13px;font-weight:500;
  cursor:pointer;flex-shrink:0;
  transition:all .15s;
  touch-action:manipulation;
}
.viewer-back:active{transform:scale(0.95);background:var(--accent-md);}
.viewer-back svg{width:14px;height:14px;}
.viewer-info{flex:1;min-width:0;overflow:hidden;}
.viewer-path{font-family:'DM Mono',monospace;font-size:10px;color:var(--fg3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.viewer-filename{font-size:13px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.viewer-chips{display:flex;gap:4px;flex-shrink:0;}
.viewer-chip{
  font-family:'DM Mono',monospace;font-size:9px;
  padding:3px 8px;border-radius:6px;
  background:var(--surface2);color:var(--fg2);
  border:1px solid var(--glass-border);
  text-transform:uppercase;letter-spacing:0.5px;
}
.chip-drive{background:rgba(66,133,244,0.1);color:#4285f4;border-color:rgba(66,133,244,0.2);}

/* Viewer toolbar */
.viewer-toolbar{
  flex-shrink:0;display:flex;gap:6px;
  padding:8px 14px;
  border-bottom:1px solid var(--glass-border);
  background:rgba(8,10,13,0.9);
  overflow-x:auto;
}
.viewer-toolbar::-webkit-scrollbar{display:none;}
.tbtn{
  display:flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:8px;
  background:var(--glass);border:1px solid var(--glass-border);
  color:var(--fg2);font-size:12px;font-weight:500;
  cursor:pointer;flex-shrink:0;text-decoration:none;
  transition:all .15s;
  touch-action:manipulation;
}
.tbtn:active{transform:scale(0.95);background:var(--surface2);}
.tbtn svg{width:14px;height:14px;flex-shrink:0;}

/* Viewer body */
.viewer-body{
  flex:1;position:relative;overflow:hidden;
  background:#0a0c10;
}
.viewer-loader{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;z-index:10;
  background:var(--bg);transition:opacity .3s;
}
.viewer-loader.hidden{opacity:0;pointer-events:none;}
.loader-spin{
  width:32px;height:32px;border:2px solid var(--glass-border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--fg3);}
.viewer-frame{width:100%;height:100%;border:none;}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;padding:40px;}
.empty-icon{font-size:40px;opacity:0.6;}
.empty-title{font-size:15px;font-weight:600;color:var(--fg2);}
.empty-desc{font-size:12px;color:var(--fg3);text-align:center;max-width:240px;}

/* No results */
.no-results{text-align:center;padding:40px 20px;}
.no-results h3{font-size:14px;color:var(--fg2);margin-bottom:4px;}
.no-results p{font-family:'DM Mono',monospace;font-size:11px;color:var(--fg3);}

/* Loading skeleton */
.skeleton{padding:8px 6px;}
.skel-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:12px;margin-bottom:4px;
  border-left:3px solid var(--skel-color,var(--fg3));
  background:color-mix(in srgb, var(--skel-color,var(--fg3)) 4%, transparent);
  opacity:0.35;
}
.skel-dot{width:28px;height:28px;border-radius:8px;background:color-mix(in srgb, var(--skel-color,var(--fg3)) 12%, transparent);flex-shrink:0;}
.skel-text{flex:1;height:14px;border-radius:6px;background:var(--surface2);}
.skel-badge{width:28px;height:14px;border-radius:8px;background:var(--surface2);}

/* Toast */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:10px 20px;border-radius:12px;
  background:var(--surface2);color:var(--fg);
  font-family:'DM Mono',monospace;font-size:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 12px var(--accent-lo);
  border:1px solid var(--glass-border);
  z-index:9999;opacity:0;
  transition:opacity .3s,transform .3s;
  pointer-events:none;
}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── BOTTOM NAV ─── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(62px + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:rgba(8,10,13,0.92);
  backdrop-filter:blur(24px) saturate(150%);
  border-top:1px solid var(--glass-border);
  z-index:600;display:flex;justify-content:space-around;align-items:center;
}
.bottom-nav a{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;color:var(--fg3);text-decoration:none;
  font-family:'DM Mono',monospace;font-size:9px;
  text-transform:uppercase;letter-spacing:1px;padding:8px 0;
  transition:color .2s;touch-action:manipulation;position:relative;
}
.bottom-nav a svg{opacity:0.4;transition:opacity .2s;}
.bottom-nav a.active{color:var(--accent);}
.bottom-nav a.active svg{opacity:1;color:var(--accent);}
.bottom-nav a.active::before{
  content:'';position:absolute;top:-1px;left:25%;right:25%;height:2px;
  background:var(--accent);border-radius:0 0 2px 2px;box-shadow:0 0 8px var(--accent);
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="brand"><span class="brand-dot"></span>ISC<span>.</span>exe</div>
    <span class="header-right">Resources</span>
  </header>

  <div class="streams" id="streams"></div>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-ico">⌕</span>
      <input class="search-input" id="search" type="search" placeholder="Search files…" autocomplete="off"/>
      <button class="search-clear" id="searchClear" onclick="document.getElementById('search').value='';this.classList.remove('visible');render();">✕</button>
    </div>
  </div>

  <div class="subjects" id="subjects"></div>
</div>

<!-- Viewer overlay -->
<div class="viewer" id="viewer">
  <div class="viewer-header">
    <button class="viewer-back" onclick="closeViewer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back
    </button>
    <div class="viewer-info">
      <div class="viewer-path" id="vPath"></div>
      <div class="viewer-filename" id="vName"></div>
    </div>
    <div class="viewer-chips" id="vChips"></div>
  </div>
  <div class="viewer-toolbar" id="vToolbar">
    <a class="tbtn" id="btnOpen" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open
    </a>
    <a class="tbtn" id="btnDownload" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </a>
    <button class="tbtn" onclick="copyLink()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Share
    </button>
  </div>
  <div class="viewer-body" id="viewerBody">
    <div class="viewer-loader" id="vLoader">
      <div class="loader-spin"></div>
      <div class="loader-text">Loading preview…</div>
    </div>
    <iframe class="viewer-frame" id="vFrame" title="Preview" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav" id="bottomNav">
  <a href="/mobile"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
  <a href="/resource" class="active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span>Resources</span></a>
  <a href="/timetable"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Timetable</span></a>
</nav>

<script>
const OWNER='HJexe',REPO='Class-12-ISC',BRANCH='main';
const STREAMS={
  commerce:['English','Economics','Accounts','Business Studies','Commerce','Maths'],
  science:['English','Physics','Chemistry','Biology','Maths','Computer Science','Biotechnology','Environmental Science'],
  humanities:['English','History','Political Science','Geography','Sociology','Psychology','Fine Arts','Home Science'],
};
const STREAM_META={
  commerce:{name:'Commerce',color:'#ffb830'},
  science:{name:'Science',color:'#3bff6c'},
  humanities:{name:'Humanities',color:'#bf5fff'},
};
const COLORS={
  English:'#e8a87c',Economics:'#3bff6c',Accounts:'#60b3ff','Business Studies':'#ffb830',
  Commerce:'#ff6b9d',Maths:'#bf5fff',Physics:'#5fd4e8',Chemistry:'#5fffa0',Biology:'#7ab86a',
  'Computer Science':'#60b3ff',Biotechnology:'#bf5fff','Environmental Science':'#ffbe3f',
  History:'#e07b54','Political Science':'#ff6b6b',Geography:'#4ecdc4',
  Sociology:'#a8d08d',Psychology:'#c27aff','Fine Arts':'#ff85a1','Home Science':'#ffd166',
};
const ALLOWED=new Set(['pdf','doc','docx','txt','ppt','pptx','xls','xlsx']);
let allFiles=[],stream='commerce',currentEntry=null;

function raw(p){return p.split('/').map(encodeURIComponent).join('/');}
function previewUrl(p){return`https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${raw(p)}`)}`;}
function drivePreview(url){const m=url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/)||url.match(/[?&]id=([a-zA-Z0-9_-]+)/);return m?`https://drive.google.com/file/d/${m[1]}/preview`:`https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(url)}`;}
function extractId(url){const m=url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/)||url.match(/[?&]id=([a-zA-Z0-9_-]+)/);return m?m[1]:'';}
function allowed(p){const e=p.split('.').pop().toLowerCase();return ALLOWED.has(e)||/\/text\.?$/i.test(p);}
function inSubjects(p,subs){return subs.some(s=>p.startsWith(s+'/'));}
function key(e){return`${e.path}::${e.url}`;}
function normalize(item){
  if(typeof item==='string')return{path:item,url:`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${raw(item)}`,preview:previewUrl(item),source:'repo'};
  if(!item?.path||!item?.url)return null;
  const drive=item.source==='gdrive'||/drive\.google\.com/i.test(item.url);
  return{path:item.path,url:item.url,preview:drive?drivePreview(item.url):previewUrl(item.path),source:drive?'gdrive':'repo'};
}

// Build stream pills
const streamsEl=document.getElementById('streams');
Object.entries(STREAM_META).forEach(([k,v])=>{
  const btn=document.createElement('button');
  btn.className='stream-pill'+(k===stream?' active':'');
  btn.style.setProperty('--pill-color',v.color);
  btn.innerHTML=`<span class="stream-dot"></span>${v.name}`;
  btn.onclick=()=>{stream=k;document.querySelectorAll('.stream-pill').forEach(p=>p.classList.toggle('active',p===btn));render();};
  streamsEl.appendChild(btn);
});

// Search
const searchInput=document.getElementById('search');
const searchClear=document.getElementById('searchClear');
searchInput.addEventListener('input',()=>{searchClear.classList.toggle('visible',!!searchInput.value);render();});

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');
  setTimeout(()=>t.classList.remove('visible'),2000);
}
function copyLink(){
  if(!currentEntry){showToast('Open a file first');return;}
  navigator.clipboard.writeText(location.href).then(()=>showToast('Link copied!')).catch(()=>showToast('Link copied!'));
}

// Build tree
function buildTree(paths){const root={dirs:new Map(),files:[]};for(const p of paths){const pts=p.split('/').filter(Boolean);let n=root;for(let i=0;i<pts.length-1;i++){if(!n.dirs.has(pts[i]))n.dirs.set(pts[i],{dirs:new Map(),files:[]});n=n.dirs.get(pts[i]);}const f=pts[pts.length-1];if(f)n.files.push(f);}return root;}

function renderTree(node,subj,fmap,prefix=''){
  let html='';
  [...node.dirs.keys()].sort().forEach(name=>{
    const fp=prefix?`${prefix}/${name}`:name;
    const id='f_'+btoa(subj+'/'+fp).replace(/[^a-zA-Z0-9]/g,'');
    html+=`<button class="folder-toggle" onclick="this.classList.toggle('open')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <span style="flex:1;font-size:13px">${name}</span>
      <span class="folder-arrow">▶</span>
    </button>
    <div class="folder-children">${renderTree(node.dirs.get(name),subj,fmap,fp)}</div>`;
  });
  [...node.files].sort().forEach(fname=>{
    const rel=prefix?`${prefix}/${fname}`:fname;
    const fpath=`${subj}/${rel}`;
    const entry=fmap.get(fpath);
    if(entry)html+=fileHtml(entry,fname);
  });
  return html;
}

function fileHtml(entry,label){
  const ext=label.split('.').pop().toLowerCase();
  const cls=ext==='pdf'?'badge-pdf':(ext==='doc'||ext==='docx')?'badge-doc':'badge-def';
  const k=key(entry).replace(/'/g,"\\'");
  return`<div class="file-item" data-key="${k}" onclick="preview(allFiles.find(f=>key(f)==='${k}'))">
    <span class="file-badge ${cls}">${ext}</span>
    <span class="file-name">${label}</span>
  </div>`;
}

function render(){
  const q=searchInput.value.trim().toLowerCase();
  const subs=STREAMS[stream]||[];
  const wrap=document.getElementById('subjects');
  const sf=allFiles.filter(f=>inSubjects(f.path,subs));

  if(!sf.length&&!allFiles.length){
    // Show skeleton
    wrap.innerHTML='<div class="skeleton">'+subs.map(s=>`<div class="skel-item" style="--skel-color:${COLORS[s]||'#666'}"><div class="skel-dot"></div><div class="skel-text"></div><div class="skel-badge"></div></div>`).join('')+'</div>';
    return;
  }

  let html='';
  subs.forEach(subj=>{
    const filtered=sf.filter(f=>f.path.startsWith(subj+'/')&&f.path.toLowerCase().includes(q));
    if(!filtered.length)return;
    const color=COLORS[subj]||'var(--accent)';
    const fmap=new Map(filtered.map(f=>[f.path,f]));

    let filesHtml;
    if(q){
      filesHtml=filtered.sort((a,b)=>a.path.localeCompare(b.path)).map(f=>fileHtml(f,f.path.split('/').pop())).join('');
    } else {
      const rel=filtered.map(f=>f.path.slice(subj.length+1));
      filesHtml=renderTree(buildTree(rel),subj,fmap);
    }

    html+=`<div class="subject ${q?'open':''}" style="--subj-color:${color}" onclick="if(event.target.closest('.file-item,.folder-toggle'))return;this.classList.toggle('open')">
      <div class="subject-header">
        <div class="subject-icon">${subj.charAt(0)}</div>
        <span class="subject-name">${subj}</span>
        <span class="subject-count">${filtered.length}</span>
        <span class="subject-arrow">▶</span>
      </div>
      <div class="file-list" onclick="event.stopPropagation()">${filesHtml}</div>
    </div>`;
  });

  if(!html)html=`<div class="no-results"><h3>${q?`No results for "${q}"`:'No files yet'}</h3><p>${q?'Try a different term':'Check back later'}</p></div>`;
  wrap.innerHTML=html;
}

function preview(entry){
  if(!entry)return;
  currentEntry=entry;
  const parts=entry.path.split('/');
  const fname=parts[parts.length-1];
  const ext=fname.split('.').pop().toLowerCase();

  document.getElementById('vPath').textContent=parts.slice(0,-1).join(' / ');
  document.getElementById('vName').textContent=fname;

  const srcCls=entry.source==='gdrive'?'chip-drive':'';
  const srcLbl=entry.source==='gdrive'?'Drive':'GitHub';
  document.getElementById('vChips').innerHTML=`<span class="viewer-chip">${ext}</span><span class="viewer-chip ${srcCls}">${srcLbl}</span>`;

  document.getElementById('btnOpen').href=entry.url;
  const dl=document.getElementById('btnDownload');
  dl.href=entry.url;dl.setAttribute('download',fname);

  const loader=document.getElementById('vLoader');
  loader.classList.remove('hidden');

  let viewerUrl;
  if(entry.source==='gdrive'){
    const id=extractId(entry.url);
    viewerUrl=id?`https://drive.google.com/file/d/${id}/preview`:entry.preview;
  } else {viewerUrl=entry.preview;}

  const frame=document.getElementById('vFrame');
  frame.src='';
  setTimeout(()=>{
    frame.src=viewerUrl;
    frame.onload=()=>loader.classList.add('hidden');
    setTimeout(()=>loader.classList.add('hidden'),8000);
  },60);

  // Mark active
  document.querySelectorAll('.file-item.active').forEach(e=>e.classList.remove('active'));
  const el=document.querySelector(`.file-item[data-key="${CSS.escape(key(entry))}"]`);
  if(el)el.classList.add('active');

  // Open viewer with haptic-like effect
  const viewer=document.getElementById('viewer');
  viewer.classList.add('open');
  document.getElementById('bottomNav').style.zIndex='0';
}

function closeViewer(){
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('bottomNav').style.zIndex='600';
  document.getElementById('vFrame').src='';
}

async function load(){
  render(); // show skeleton
  const merged=new Map();
  try{const r=await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/files.json`);if(r.ok)(await r.json()).map(normalize).filter(Boolean).forEach(f=>merged.set(key(f),f));}catch(e){}
  try{
    const r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`,{headers:{Accept:'application/vnd.github+json'}});
    if(r.ok){
      const d=await r.json();
      if(!d.message){
        const ALL=[...new Set(Object.values(STREAMS).flat())];
        const paths=(d.tree||[]).filter(i=>i.type==='blob').map(i=>i.path).filter(p=>inSubjects(p,ALL)&&allowed(p));
        paths.filter(p=>ALLOWED.has(p.split('.').pop().toLowerCase())).map(normalize).filter(Boolean).forEach(f=>merged.set(key(f),f));
        await Promise.all(paths.filter(p=>/\/text\.?$/i.test(p)).map(async tp=>{
          try{
            const tr=await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${tp.split('/').map(encodeURIComponent).join('/')}`);
            if(!tr.ok)return;const dir=tp.split('/').slice(0,-1).join('/');
            (await tr.text()).trim().split('\n').filter(Boolean).forEach(line=>{
              line=line.trim();let name,url;
              if(line.includes('|')){const s=line.indexOf('|');name=line.slice(0,s).trim();url=line.slice(s+1).trim();}
              else if(/^https?:\/\//i.test(line)){url=line;name=dir.split('/').pop()||'File';}else return;
              if(!/^https?:\/\//i.test(url))return;
              const entry={path:dir+'/'+name,url,preview:drivePreview(url),source:'gdrive'};merged.set(key(entry),entry);
            });
          }catch{}
        }));
      }
    }
  }catch(e){}
  allFiles=[...merged.values()];
  render();
}
load();
</script>
