<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hrishi's Resource Library</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root { --bg:#0b0d10; --fg:#e6e9ef; --muted:#9aa4b2; --accent:#4da3ff; --card:#13161a; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--fg); }
header { padding:16px 20px; border-bottom:1px solid #1d2228; }
header h1 { margin:0; }
#wrap { display:grid; grid-template-columns: 350px 1fr; gap:16px; padding:16px; height:calc(100vh - 70px); }
#left,#right { background:var(--card); border:1px solid #1d2228; border-radius:14px; overflow:auto; }
#left { padding:14px; }
ul { list-style:none; padding-left:15px; }
li { margin:4px 0; }
a { color:var(--fg); text-decoration:none; }
a:hover { color:var(--accent); }
.folder-title { font-weight:600; margin-top:15px; }
#viewerBar { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #1d2228; }
#viewer { width:100%; height:100%; border:0; }
.btn { background:#0f1216; border:1px solid #27303a; color:var(--fg); padding:6px 10px; border-radius:8px; text-decoration:none; font-size:13px; }
</style>
</head>

<body>

<header>
  <h1>📚 Hrishi's Resource Library</h1>
</header>

<div id="wrap">

<div id="left">
  <div id="folders"></div>
</div>

<div id="right">
  <div id="viewerBar">
    <div id="currentPath">Select a resource...</div>
    <a id="openTab" class="btn" target="_blank">Open in new tab</a>
  </div>
  <iframe id="viewer"></iframe>
</div>

</div>

<script>

const OWNER = "YOUR_GITHUB_USERNAME";
const REPO = "YOUR_REPOSITORY_NAME";

const SUBJECT_FOLDERS = [
  "Economics",
  "Accounts",
  "Business Studies",
  "Commerce"
];

const $folders = document.getElementById("folders");
const $viewer = document.getElementById("viewer");
const $currentPath = document.getElementById("currentPath");
const $openTab = document.getElementById("openTab");

function pathToUrl(path){
  return path.split('/').map(encodeURIComponent).join('/');
}

function showPreview(path){
  const url = pathToUrl(path);
  $viewer.src = url;
  $currentPath.textContent = path;
  $openTab.href = url;
}

async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error("GitHub API Error");
  return r.json();
}

async function loadResources(){

  const repoMeta = await fetchJSON(`https://api.github.com/repos/${OWNER}/${REPO}`);
  const branchData = await fetchJSON(`https://api.github.com/repos/${OWNER}/${REPO}/branches/${repoMeta.default_branch}`);
  const sha = branchData.commit.sha;
  const tree = await fetchJSON(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${sha}?recursive=1`);

  const pdfFiles = tree.tree
    .filter(f => f.type === "blob" && f.path.endsWith(".pdf"));

  SUBJECT_FOLDERS.forEach(folder => {

    const section = document.createElement("div");
    const title = document.createElement("div");
    title.className = "folder-title";
    title.textContent = "📂 " + folder;
    section.appendChild(title);

    const ul = document.createElement("ul");

    pdfFiles
      .filter(f => f.path.startsWith(folder + "/"))
      .forEach(file => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = pathToUrl(file.path);
        a.textContent = file.path.replace(folder + "/", "");
        a.onclick = (e)=>{
          e.preventDefault();
          showPreview(file.path);
        };
        li.appendChild(a);
        ul.appendChild(li);
      });

    section.appendChild(ul);
    $folders.appendChild(section);

  });

}

loadResources().catch(err=>{
  $folders.innerHTML = "Error loading resources.";
});

</script>

</body>
</html>
