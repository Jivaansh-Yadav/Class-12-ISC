<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ISC.exe</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root {
  --bg:#0b0d10;
  --fg:#e6e9ef;
  --muted:#9aa4b2;
  --accent:#4da3ff;
  --card:#13161a;
  --border:#1d2228;
}

* { box-sizing:border-box; }

body {
  margin:0;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background:var(--bg);
  color:var(--fg);
}

header {
  padding:16px 20px;
  border-bottom:1px solid var(--border);
}

header h1 { margin:0; }

#wrap {
  display:grid;
  grid-template-columns:350px 1fr;
  gap:16px;
  padding:16px;
  height:calc(100vh - 70px);
}

#left,
#right {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}

#left {
  overflow:auto;
  padding:14px;
}

#right {
  display:grid;
  grid-template-rows:auto 1fr;
}

#viewerBar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:10px;
  border-bottom:1px solid var(--border);
}

#currentPath {
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#viewer {
  width:100%;
  height:100%;
  border:0;
}

.btn {
  background:#0f1216;
  border:1px solid #27303a;
  color:var(--fg);
  padding:6px 10px;
  border-radius:8px;
  text-decoration:none;
  font-size:13px;
  white-space:nowrap;
}

.btn:hover {
  border-color:var(--accent);
  color:var(--accent);
}

.accordion {
  margin:0 0 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#0f1216;
}

.sub-accordion {
  margin:8px 0 0;
}

.accordion summary {
  list-style:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:10px;
  font-weight:600;
}

.accordion summary::-webkit-details-marker { display:none; }

.folder-info {
  display:flex;
  align-items:center;
  gap:8px;
}

.chevron {
  color:var(--muted);
  transition:transform .2s ease;
}

details[open] > summary .chevron {
  transform:rotate(90deg);
}

.file-list {
  list-style:none;
  margin:0;
  padding:0 10px 10px;
}

.file-list li { margin:6px 0; }

.file-link {
  color:var(--fg);
  text-decoration:none;
  font-size:14px;
  line-height:1.3;
}

.file-link:hover,
.file-link.active {
  color:var(--accent);
}

.empty {
  color:var(--muted);
  font-size:13px;
  padding:0 10px 10px;
}

.loading {
  color:var(--muted);
  font-size:13px;
  padding:10px;
  text-align:center;
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.error {
  color:#ff6b6b;
  font-size:13px;
  padding:10px;
  line-height:1.6;
}

@media (max-width: 900px) {
  #wrap {
    grid-template-columns:1fr;
    height:auto;
  }
  #right { min-height:60vh; }
}
</style>
</head>

<body>
<header>
  <h1>📚 ISC.exe</h1>
</header>

<div id="wrap">
  <div id="left">
    <div id="folders"><div class="loading">Loading resources...</div></div>
  </div>

  <div id="right">
    <div id="viewerBar">
      <div id="currentPath">Select a resource...</div>
      <a id="openTab" class="btn" target="_blank" rel="noopener noreferrer">Open in new tab</a>
    </div>
    <iframe id="viewer" title="PDF Preview" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const GITHUB_OWNER  = "HJexe";
const GITHUB_REPO   = "Class-12-ISC";
const GITHUB_BRANCH = "main";

const SUBJECT_FOLDERS = [
  "Economics",
  "Accounts",
  "Business Studies",
  "Commerce"
];
// ─────────────────────────────────────────────────────────────────────────────

const RAW_BASE = `https://${GITHUB_OWNER}.github.io/${GITHUB_REPO}/`;

const $folders     = document.getElementById("folders");
const $viewer      = document.getElementById("viewer");
const $currentPath = document.getElementById("currentPath");
const $openTab     = document.getElementById("openTab");

function rawUrl(path) {
  return RAW_BASE + path.split("/").map(encodeURIComponent).join("/");
}

function setActiveLink(path) {
  document.querySelectorAll(".file-link.active").forEach(l => l.classList.remove("active"));
  const el = document.querySelector(`.file-link[data-path="${CSS.escape(path)}"]`);
  if (el) el.classList.add("active");
}

function previewUrl(path) {
  const fileUrl = rawUrl(path);
  // Render through Google Docs viewer to avoid executing PDF-embedded auto-print actions.
  return `https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(fileUrl)}`;
}

function showPreview(path) {
  const raw = rawUrl(path);
  $viewer.src = previewUrl(path);
  $currentPath.textContent = path;
  $openTab.href = raw;
  setActiveLink(path);
}

// Build a nested tree from a flat list of relative paths (no subject prefix)
function buildTree(paths) {
  const root = { dirs: new Map(), files: [] };
  for (const p of paths) {
    const parts = p.split("/").filter(Boolean);
    let node = root;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!node.dirs.has(parts[i])) node.dirs.set(parts[i], { dirs: new Map(), files: [] });
      node = node.dirs.get(parts[i]);
    }
    const filename = parts[parts.length - 1];
    if (filename) node.files.push(filename);
  }
  return root;
}

function renderFileLink(fullPath, filename) {
  const li = document.createElement("li");
  const a  = document.createElement("a");
  a.href         = rawUrl(fullPath);
  a.className    = "file-link";
  a.dataset.path = fullPath;
  a.textContent  = filename;
  a.onclick = e => { e.preventDefault(); showPreview(fullPath); };
  li.appendChild(a);
  return li;
}

function renderSubtree(node, subject, prefix = "") {
  const ul = document.createElement("ul");
  ul.className = "file-list";

  [...node.dirs.keys()].sort((a, b) => a.localeCompare(b)).forEach(folderName => {
    const li      = document.createElement("li");
    const details = document.createElement("details");
    details.className = "accordion sub-accordion";

    const summary = document.createElement("summary");
    summary.innerHTML = `<span class="folder-info">📁 ${folderName}</span><span class="chevron">▶</span>`;

    const nextPrefix = prefix ? `${prefix}/${folderName}` : folderName;
    details.appendChild(summary);
    details.appendChild(renderSubtree(node.dirs.get(folderName), subject, nextPrefix));
    li.appendChild(details);
    ul.appendChild(li);
  });

  [...node.files].sort((a, b) => a.localeCompare(b)).forEach(filename => {
    const relative = prefix ? `${prefix}/${filename}` : filename;
    const fullPath  = `${subject}/${relative}`;
    ul.appendChild(renderFileLink(fullPath, filename));
  });

  return ul;
}

function buildFolderSection(subject, paths) {
  const details = document.createElement("details");
  details.className = "accordion";

  const summary = document.createElement("summary");
  summary.innerHTML = `<span class="folder-info">📂 ${subject}</span><span class="chevron">▶</span>`;
  details.appendChild(summary);

  if (paths.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No resources found.";
    details.appendChild(empty);
  } else {
    // Strip the "Subject/" prefix before building the tree
    const relative = paths.map(p => p.slice(subject.length + 1));
    details.appendChild(renderSubtree(buildTree(relative), subject));
  }

  return details;
}

async function loadResources() {
  try {
    // files.json lives at the root of the repo, served via GitHub Pages
    const res = await fetch("files.json");
    if (!res.ok) throw new Error(`files.json not found (${res.status}). Has the GitHub Action run yet?`);

    const allFiles = await res.json(); // flat array of paths like "Economics/Papers/foo.pdf"

    $folders.innerHTML = "";

    SUBJECT_FOLDERS.forEach(subject => {
      const subjectFiles = allFiles.filter(p => p.startsWith(subject + "/"));
      $folders.appendChild(buildFolderSection(subject, subjectFiles));
    });

  } catch (err) {
    $folders.innerHTML = `<div class="error">⚠️ ${err.message}<br><br>Make sure the <strong>Generate File Index</strong> GitHub Action has run at least once so <code>files.json</code> exists in the repo.</div>`;
    console.error(err);
  }
}

loadResources();
</script>
</body>
</html>
