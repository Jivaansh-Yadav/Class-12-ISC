name: Generate File Index

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate files.json
        run: |
          python3 - <<'EOF'
          import os, json

          SUBJECTS = ["Economics", "Accounts", "Business Studies", "Maths-(creds-Abhinav)", "Commerce"]
          ALLOWED = {".pdf", ".txt", ".png", ".jpg", ".jpeg", ".docx", ".xlsx"}

          files = []
          for subject in SUBJECTS:
            if not os.path.isdir(subject):
              continue
            for root, dirs, filenames in os.walk(subject):
              # skip hidden dirs
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for fn in filenames:
                if any(fn.lower().endswith(ext) for ext in ALLOWED):
                  rel = os.path.join(root, fn).replace("\\", "/")
                  files.append(rel)

          files.sort()
          with open("files.json", "w") as f:
            json.dump(files, f, indent=2)
          print(f"✓ Indexed {len(files)} files")
          EOF

      - name: Commit files.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files.json
          git diff --staged --quiet || (
            git pull --rebase origin main &&
            git commit -m "chore: update file index [skip ci]" &&
            git push
          )
