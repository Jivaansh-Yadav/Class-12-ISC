name: Sync YouTube Channels

on:
  schedule:
    # Runs automatically every Sunday at Midnight UTC to keep banners fresh
    - cron: '0 0 * * 0' 
  workflow_dispatch:      # Allows you to click "Run workflow" manually in the Actions tab

jobs:
  update-channels:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run TypeScript Channel Sync (YouTube API)
        env:
          # Pulls your secure API key from GitHub repository secrets
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm run sync:channels

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json
          
          # Only commit if the script actually updated channels.json
          if git diff --staged --quiet; then
            echo "No channel image changes required. Everything is up to date."
          else
            git commit -m "chore: auto-update YouTube channel images via API [skip ci]"
            git push origin main
          fi