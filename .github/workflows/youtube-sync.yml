name: Sync YouTube Channels

on:
  schedule:
    # Every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update-channels:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so the auto-commit action can push cleanly
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run channel sync
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm run sync:channels

      - name: Commit updated channels.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update YouTube channel images [skip ci]'
          # Only track the one file that the script modifies
          file_pattern: channels.json
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          # Silently succeeds (exit 0) when there is nothing to commit
          skip_dirty_check: false