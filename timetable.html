<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISC.exe — Timetable 2026</title>
  <title>ISC.exe | Resources</title>
<script>window.va = window.va || function(){(window.vaq = window.vaq||[]).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #111210;
      --bg2:     #151714;
      --surface: #1a1d19;
      --surface2:#1f221e;
      --border:  #272b25;
      --border2: #313630;
      --accent:  #7ab86a;
      --accent-lo: rgba(122,184,106,0.09);
      --fg:      #dde3da;
      --fg2:     #96a492;
      --fg3:     #505c4e;
      --amber:   #d4a84b;
      --amber-lo: rgba(212,168,75,0.09);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      opacity: 0.022;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 50px;
      background: rgba(17,18,16,0.92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 13px; font-weight: 500; color: var(--fg);
      text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
    }
    .nav-links { display: flex; gap: 5px; }
    .nav-link {
      text-decoration: none; color: var(--fg3);
      font-family: 'DM Mono', monospace; font-size: 11.5px;
      padding: 5px 13px; border: 1px solid transparent; border-radius: 6px;
      transition: all .18s;
    }
    .nav-link:hover { color: var(--fg2); border-color: var(--border2); background: var(--surface); }

    /* HERO */
    .hero {
      position: relative; z-index: 1;
      padding: 44px 32px 28px;
      max-width: 900px; margin: 0 auto;
    }
    .hero-eye {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--fg3); letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .hero-eye span { color: var(--accent); }
    h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400; line-height: 1.1;
      margin-bottom: 8px; color: var(--fg);
    }
    h1 em { font-style: italic; color: var(--accent); }
    .hero-sub {
      font-family: 'DM Mono', monospace; font-size: 12px;
      color: var(--fg3); margin-bottom: 28px;
    }

    /* CONTROLS */
    .controls {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 0 32px 20px;
      display: flex; align-items: center; gap: 10px;
    }

    .stream-tabs { display: flex; gap: 5px; }
    .stream-tab {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 16px; border-radius: 7px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: .5px; text-transform: uppercase;
      border: 1px solid var(--border2); background: transparent;
      color: var(--fg3); cursor: pointer; transition: all .18s;
    }
    .stream-tab:hover { color: var(--fg2); background: var(--surface); }
    .stream-tab.active-commerce {
      color: var(--amber); background: var(--amber-lo);
      border-color: rgba(212,168,75,0.3);
    }
    .stream-tab.active-science {
      color: var(--accent); background: var(--accent-lo);
      border-color: rgba(122,184,106,0.3);
    }

    /* STATS */
    .stats {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 0 32px 24px;
      display: flex; gap: 24px;
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--fg3);
    }
    .stats span { color: var(--fg2); font-weight: 500; }

    /* TABLE */
    .table-wrap {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 0 32px 60px;
    }
    .table-shell {
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      background: var(--bg2);
    }
    .table-topbar {
      padding: 9px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: var(--fg3); display: flex; gap: 10px;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: var(--surface);
      padding: 10px 18px; text-align: left;
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: var(--fg3); letter-spacing: 1.5px; text-transform: uppercase;
      border-bottom: 1px solid var(--border); font-weight: 400;
    }

    tbody tr {
      border-bottom: 1px solid rgba(39,43,37,0.6);
      transition: background .12s;
      animation: fadeRow .3s ease both;
    }
    @keyframes fadeRow {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: none; }
    }
    tbody tr:hover { background: var(--surface); }
    tbody tr:last-child { border-bottom: none; }

    td { padding: 11px 18px; font-size: 13px; vertical-align: middle; }

    .td-date {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--fg3); white-space: nowrap; min-width: 140px;
    }
    .td-day {
      display: block; font-size: 9px; color: var(--fg3);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;
    }
    .td-datenum { color: var(--fg2); font-size: 12px; }

    .td-time {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--fg3); white-space: nowrap;
    }

    .subj-name { font-weight: 500; color: var(--fg); }
    .subj-badge {
      display: inline-block; margin-top: 3px;
      font-family: 'DM Mono', monospace; font-size: 9px;
      padding: 1px 6px; border-radius: 3px; letter-spacing: .5px;
    }
    .badge-commerce { background: rgba(212,168,75,0.1); color: var(--amber); }
    .badge-science  { background: rgba(122,184,106,0.1); color: var(--accent); }
    .badge-both     { background: var(--surface2); color: var(--fg3); }

    .td-dur {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--fg3); text-align: right; white-space: nowrap;
    }

    /* Month divider */
    .month-row td {
      background: var(--surface2);
      padding: 6px 18px;
      font-family: 'DM Mono', monospace; font-size: 9px;
      color: var(--fg3); letter-spacing: 2px; text-transform: uppercase;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    /* Today / past */
    .row-today {
      background: rgba(122,184,106,0.04) !important;
      border-left: 2px solid var(--accent);
    }
    .row-today .td-date::before {
      content: 'today';
      display: block; font-family: 'DM Mono', monospace;
      font-size: 9px; color: var(--accent); margin-bottom: 2px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .row-past { opacity: 0.38; }

    .no-exams {
      padding: 48px; text-align: center;
      font-family: 'DM Mono', monospace; color: var(--fg3); font-size: 12px;
    }

    /* Footer */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 18px 32px;
      display: flex; justify-content: space-between; align-items: center;
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--fg3);
    }

    @media (max-width: 600px) {
      nav, .hero, .controls, .stats, .table-wrap, footer { padding-left: 16px; padding-right: 16px; }
      th, td { padding: 8px 12px; }
      .td-date { min-width: 90px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">
    <span class="logo-dot"></span>
    ISC.exe
  </a>
  <div class="nav-links">
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link" href="/resource.html">Resources</a>
  </div>
</nav>

<div class="hero">
  <p class="hero-eye">// exam · schedule · <span>2026</span></p>
  <h1>Timetable, <em>sorted.</em></h1>
  <p class="hero-sub">ISC Class XII · Board Examination Schedule · 2026</p>
</div>

<div class="controls">
  <div class="stream-tabs">
    <button class="stream-tab active-commerce" id="btn-commerce" onclick="setStream('commerce')">📊 Commerce</button>
    <button class="stream-tab" id="btn-science" onclick="setStream('science')">🔬 Science</button>
  </div>
</div>

<div class="stats" id="statsBar">
  <div>Exams: <span id="statTotal">—</span></div>
  <div>Next: <span id="statNext">—</span></div>
</div>

<div class="table-wrap">
  <div class="table-shell">
    <div class="table-topbar">
      <span>isc-timetable-2026</span>
      <span>·</span>
      <span>all exams at 2:00 PM IST unless noted</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th>Subject</th>
          <th style="text-align:right">Duration</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="noExams" class="no-exams" style="display:none">No exams for this stream.</div>
  </div>
</div>

<footer>
  <span>ISC.exe · © 2025 HJexe</span>
  <span>HJexe / Class-12-ISC</span>
</footer>

<script>
  // Only the relevant subjects — no Art, Psychology, Legal Studies, etc.
  const ALL_EXAMS = [
    // ── COMMERCE ──────────────────────────────────────────────
    { date:'2026-02-20', day:'Friday',    time:'2:00 PM', subject:'Accounts',           stream:'commerce' },
    { date:'2026-02-27', day:'Friday',    time:'2:00 PM', subject:'Commerce',           stream:'commerce' },
    { date:'2026-03-09', day:'Monday',    time:'2:00 PM', subject:'Mathematics',        stream:'both'     },
    { date:'2026-03-11', day:'Wednesday', time:'2:00 PM', subject:'Business Studies',   stream:'commerce' },
    { date:'2026-03-23', day:'Monday',    time:'2:00 PM', subject:'Economics',          stream:'commerce' },


    // ── SCIENCE ───────────────────────────────────────────────
    { date:'2026-02-17', day:'Tuesday',   time:'2:00 PM', subject:'Electricity & Electronics',            stream:'science' },
    { date:'2026-02-23', day:'Monday',    time:'2:00 PM', subject:'Chemistry — Paper 1 (Theory)',         stream:'science' },
    { date:'2026-03-02', day:'Monday',    time:'2:00 PM', subject:'Environmental Science — Paper 1',      stream:'science' },
    { date:'2026-03-06', day:'Friday',    time:'2:00 PM', subject:'Biology — Paper 1 (Theory)',           stream:'science' },
    { date:'2026-03-16', day:'Monday',    time:'2:00 PM', subject:'Physics — Paper 1 (Theory)',           stream:'science' },
    { date:'2026-03-23', day:'Monday',    time:'2:00 PM', subject:'Biotechnology — Paper 1 (Theory)',     stream:'science' },
    { date:'2026-03-27', day:'Friday',    time:'2:00 PM', subject:'Computer Science — Paper 1 (Theory)',  stream:'science' },
  ];

  // English is common to all — include it
  const ENGLISH = [
    { date:'2026-02-13', day:'Friday',    time:'2:00 PM', subject:'English — Paper 1 (Language)',     stream:'both' },
    { date:'2026-02-16', day:'Monday',    time:'2:00 PM', subject:'English — Paper 2 (Literature)',   stream:'both' },
  ];

  const EXAMS = [...ENGLISH, ...ALL_EXAMS].sort((a,b) => a.date.localeCompare(b.date));

  let currentStream = 'commerce';

  function setStream(s) {
    currentStream = s;
    document.getElementById('btn-commerce').className =
      'stream-tab' + (s === 'commerce' ? ' active-commerce' : '');
    document.getElementById('btn-science').className =
      'stream-tab' + (s === 'science'  ? ' active-science'  : '');
    renderTable();
  }

  function renderTable() {
    const today = new Date(); today.setHours(0,0,0,0);
    const filtered = EXAMS.filter(e => e.stream === 'both' || e.stream === currentStream);

    const tbody  = document.getElementById('tableBody');
    const noEl   = document.getElementById('noExams');
    tbody.innerHTML = '';

    if (!filtered.length) { noEl.style.display = 'block'; return; }
    noEl.style.display = 'none';

    let lastMonth = null;
    let nextSubject = null;

    filtered.forEach((exam, i) => {
      const examDate = new Date(exam.date); examDate.setHours(0,0,0,0);
      const isPast  = examDate < today;
      const isToday = examDate.getTime() === today.getTime();

      if (!isPast && !isToday && !nextSubject) nextSubject = exam;

      // Month divider
      const month = examDate.toLocaleString('en-US', { month:'long', year:'numeric' });
      if (month !== lastMonth) {
        lastMonth = month;
        const div = document.createElement('tr');
        div.className = 'month-row';
        div.innerHTML = `<td colspan="4">${month.toUpperCase()}</td>`;
        tbody.appendChild(div);
      }

      // Badge
      const badgeCls  = exam.stream === 'commerce' ? 'badge-commerce' : exam.stream === 'science' ? 'badge-science' : 'badge-both';
      const badgeLbl  = exam.stream === 'both' ? 'ALL' : exam.stream.toUpperCase();
      const dateStr   = examDate.toLocaleDateString('en-IN', { day:'2-digit', month:'short' });

      const tr = document.createElement('tr');
      if (isToday)     tr.className = 'row-today';
      else if (isPast) tr.className = 'row-past';
      tr.style.animationDelay = `${i * 18}ms`;

      tr.innerHTML = `
        <td class="td-date">
          <span class="td-day">${exam.day}</span>
          <span class="td-datenum">${dateStr} 2026</span>
        </td>
        <td class="td-time">${exam.time}</td>
        <td>
          <div class="subj-name">${exam.subject}</div>
          <span class="subj-badge ${badgeCls}">${badgeLbl}</span>
        </td>
        <td class="td-dur">3 hrs</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('statTotal').textContent = filtered.length;
    document.getElementById('statNext').textContent  = nextSubject
      ? nextSubject.subject.split('—')[0].split('(')[0].trim()
      : 'All done!';
  }

  renderTable();
</script>
</body>
</html>
