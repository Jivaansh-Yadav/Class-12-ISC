<script>
  (function(){
    const s=localStorage.getItem('isc-accent');
    const g=localStorage.getItem('isc-gradient');
    if(g){
      const gr=JSON.parse(g);
      const r=parseInt(gr.a.slice(1,3),16),gv=parseInt(gr.a.slice(3,5),16),b=parseInt(gr.a.slice(5,7),16);
      document.documentElement.style.setProperty('--accent',gr.a);
      document.documentElement.style.setProperty('--accent-lo',`rgba(${r},${gv},${b},0.09)`);
      document.documentElement.style.setProperty('--grad-a',gr.a);
      document.documentElement.style.setProperty('--grad-b',gr.b);
    } else if(s){
      const r=parseInt(s.slice(1,3),16),gv=parseInt(s.slice(3,5),16),b=parseInt(s.slice(5,7),16);
      document.documentElement.style.setProperty('--accent',s);
      document.documentElement.style.setProperty('--accent-lo',`rgba(${r},${gv},${b},0.09)`);
      document.documentElement.style.setProperty('--grad-a',s);
      document.documentElement.style.setProperty('--grad-b',s);
    }
  })();
</script>

<style>
:root{
  --bg:#111210;--bg2:#151714;--surface:#1a1d19;--surface2:#1f221e;
  --border:#272b25;--border2:#313630;
  --accent:#7ab86a;--accent-lo:rgba(122,184,106,0.09);--accent-md:rgba(122,184,106,0.15);
  --fg:#dde3da;--fg2:#96a492;--fg3:#505c4e;--fg4:#3a453a;
  --amber:#d4a84b;--amber-lo:rgba(212,168,75,0.09);
  --cyan:#5fd4e8;
  --grad-a:#7ab86a;--grad-b:#7ab86a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--fg);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::after{
  content:'';position:fixed;top:-100px;right:-100px;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle, rgba(122,184,106,0.04) 0%, transparent 65%);
  pointer-events:none;z-index:0;transition:background .4s;
}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  opacity:0.022;}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(122,184,106,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(122,184,106,0.02) 1px,transparent 1px);
  background-size:52px 52px;}

/* ── GRADIENT MODE ── */
body.grad-mode .logo-dot{
  background:linear-gradient(135deg,var(--grad-a),var(--grad-b)) !important;
  box-shadow:0 0 10px var(--grad-a) !important;
}
body.grad-mode .trigger-swatch{
  background:linear-gradient(135deg,var(--grad-a),var(--grad-b)) !important;
  box-shadow:0 0 6px var(--grad-a) !important;
}
body.grad-mode #heroEm{
  background:linear-gradient(135deg,var(--grad-a),var(--grad-b));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
body.grad-mode .picker-panel{border-top-color:var(--grad-a) !important;}
body.grad-mode .neb-inner{
  border-left-color:var(--grad-a) !important;
  background:linear-gradient(90deg,rgba(var(--grad-a-rgb,122,184,106),0.06),transparent) !important;
}
body.grad-mode .neb-days,.body.grad-mode .neb-countdown .ticker-time{color:var(--grad-a) !important;}
body.grad-mode .row-today{
  background:linear-gradient(90deg,rgba(var(--grad-a-rgb,122,184,106),0.04),transparent) !important;
  border-left-color:var(--grad-a) !important;
}
body.grad-mode .row-today .td-date::before{color:var(--grad-a) !important;}

/* NAV */
nav{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:52px;
  background:rgba(17,18,16,0.97);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border2);
}
.logo{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--fg);
  text-decoration:none;display:flex;align-items:center;gap:9px;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);transition:background .3s,box-shadow .3s;flex-shrink:0;}
.nav-right{display:flex;align-items:center;gap:5px;}
.nav-link{
  text-decoration:none;color:var(--fg2);
  font-family:'DM Mono',monospace;font-size:11.5px;
  padding:6px 14px;border:1px solid var(--border2);border-radius:7px;
  background:var(--surface);transition:all .18s;letter-spacing:.2px;
}
.nav-link:hover{color:var(--fg);border-color:rgba(255,255,255,0.12);background:var(--surface2);}
.nav-link.active{color:var(--accent);border-color:rgba(122,184,106,0.35);background:var(--accent-lo);}

/* THEME PICKER */
.picker-wrap{position:relative;}
.color-trigger{
  display:flex;align-items:center;gap:6px;padding:5px 10px 5px 7px;
  border:1px solid var(--border2);border-radius:6px;background:transparent;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--fg3);transition:all .18s;
}
.color-trigger:hover,.color-trigger.open{border-color:var(--accent);color:var(--fg2);background:var(--accent-lo);}
