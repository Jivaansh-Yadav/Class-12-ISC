<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<script>
  (function(){
    const s=localStorage.getItem('isc-accent');
    const g=localStorage.getItem('isc-gradient');
    if(g){const gr=JSON.parse(g);const r=parseInt(gr.a.slice(1,3),16),gv=parseInt(gr.a.slice(3,5),16),b=parseInt(gr.a.slice(5,7),16);document.documentElement.style.setProperty('--accent',gr.a);document.documentElement.style.setProperty('--accent-lo',`rgba(${r},${gv},${b},0.12)`);document.documentElement.style.setProperty('--accent-md',`rgba(${r},${gv},${b},0.22)`);document.documentElement.style.setProperty('--grad-a',gr.a);document.documentElement.style.setProperty('--grad-b',gr.b);}
    else if(s){const r=parseInt(s.slice(1,3),16),gv=parseInt(s.slice(3,5),16),b=parseInt(s.slice(5,7),16);document.documentElement.style.setProperty('--accent',s);document.documentElement.style.setProperty('--accent-lo',`rgba(${r},${gv},${b},0.12)`);document.documentElement.style.setProperty('--accent-md',`rgba(${r},${gv},${b},0.22)`);}
  })();
</script>
<title>ISC.exe — YouTube Channels</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ── EXACT resource.html variables ── */
:root{
  --bg:#111210;--bg2:#151714;
  --surface:#1a1d19;--surface2:#1f221e;
  --border:#272b25;--border2:#313630;
  --accent:#7ab86a;--accent-lo:rgba(122,184,106,.12);--accent-md:rgba(122,184,106,.22);
  --fg:#dde3da;--fg2:#b8c4b5;--fg3:#7a8a77;--fg4:#505c4e;
  --amber:#d4a84b;--amber-lo:rgba(212,168,75,.09);
  --cyan:#5fd4e8;--cyan-lo:rgba(95,212,232,.07);
  --gold:#f5c842;
  --grad-a:#7ab86a;--grad-b:#7ab86a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--fg);font-family:'DM Sans',sans-serif;font-size:13.5px;line-height:1.55;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  opacity:.022;}

/* ── NAV — exact resource.html ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:rgba(17,18,16,.95);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
.nav-left{display:flex;align-items:center;gap:14px;}
.nav-brand{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--fg);display:flex;align-items:center;gap:9px;}
.nav-brand-mark{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 8px var(--accent);animation:blink 2.5s infinite;transition:background .3s,box-shadow .3s;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nav-right{display:flex;align-items:center;gap:6px;}
.nav-links{display:flex;gap:4px;}
.nav-link{text-decoration:none;color:#ffffff;font-family:'DM Mono',monospace;font-size:11.5px;font-weight:500;padding:5px 13px;border:1px solid rgba(255,255,255,.10);border-radius:6px;transition:all .18s;display:flex;align-items:center;gap:6px;letter-spacing:.3px;}
.nav-link:hover{color:#fff;border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.07);}
.nav-link-pip{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.7;animation:breathe 2.8s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.45}50%{opacity:.85}}

/* ── LAYOUT — 300px sidebar matching resource.html ── */
.layout{display:grid;grid-template-columns:300px 1fr;height:100vh;padding-top:50px;}

/* ── SIDEBAR — exact resource.html ── */
.sidebar{display:flex;flex-direction:column;background:color-mix(in srgb,var(--accent) 2.5%,var(--bg2));border-right:1px solid color-mix(in srgb,var(--accent) 12%,var(--border));overflow:hidden;transition:background .35s,border-color .35s;}
.sidebar-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-heading{font-family:'Lora',serif;font-size:22px;font-weight:400;color:var(--fg);line-height:1.1;margin-bottom:4px;}
.sidebar-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--fg3);letter-spacing:.4px;}

/* ── TABS — exact resource.html commerce/science tabs ── */
.tabs{display:flex;padding:8px 10px;border-bottom:1px solid var(--border);gap:5px;flex-shrink:0;background:var(--bg2);}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;font-family:'DM Mono',monospace;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--fg3);cursor:pointer;transition:all .2s;font-weight:500;position:relative;overflow:hidden;}
.tab::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;transform:scaleX(0);transition:transform .2s;border-radius:2px 2px 0 0;}
.tab:hover{color:var(--fg2);background:var(--surface);border-color:var(--border2);}
#tab-commerce::before{background:var(--amber);}
#tab-commerce:hover{border-color:rgba(212,168,75,.25);}
#tab-commerce.active{color:var(--amber);background:rgba(212,168,75,.08);border-color:rgba(212,168,75,.35);box-shadow:inset 0 1px 0 rgba(212,168,75,.08);}
#tab-commerce.active::before{transform:scaleX(1);}
#tab-science::before{background:var(--cyan);}
#tab-science:hover{border-color:rgba(95,212,232,.25);}
#tab-science.active{color:var(--cyan);background:rgba(95,212,232,.07);border-color:rgba(95,212,232,.3);box-shadow:inset 0 1px 0 rgba(95,212,232,.07);}
#tab-science.active::before{transform:scaleX(1);}

/* ── SUBJECT LIST ── */
#subjList{flex:1;overflow-y:auto;padding:6px 6px 20px;}
#subjList::-webkit-scrollbar{width:3px;}
#subjList::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── SUBJECT BLOCKS — styled like resource.html subject rows ── */
.subj-block{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:8px;
  border:1px solid color-mix(in srgb,var(--subj-color) 18%,transparent);
  border-left:3px solid var(--subj-color,var(--border2));
  background:color-mix(in srgb,var(--subj-color) 5%,transparent);
  cursor:pointer;margin-bottom:3px;opacity:.88;
  box-shadow:inset 4px 0 16px color-mix(in srgb,var(--subj-color) 6%,transparent);
  transition:all .18s;
}
.subj-block:hover{
  background:color-mix(in srgb,var(--subj-color) 11%,var(--surface));
  border-color:color-mix(in srgb,var(--subj-color) 32%,transparent);
  border-left-color:var(--subj-color,var(--accent));
  opacity:1;
  box-shadow:inset 4px 0 20px color-mix(in srgb,var(--subj-color) 10%,transparent);
}
.subj-block.active{
  background:color-mix(in srgb,var(--subj-color) 13%,var(--surface));
  border-color:color-mix(in srgb,var(--subj-color) 32%,transparent);
  border-left-color:var(--subj-color,var(--accent));
  opacity:1;
  box-shadow:0 2px 14px color-mix(in srgb,var(--subj-color) 14%,transparent),
             inset 4px 0 20px color-mix(in srgb,var(--subj-color) 9%,transparent);
}
.subj-block.active .sb-name{color:var(--fg);}
.sb-icon{font-size:15px;flex-shrink:0;}
.sb-info{flex:1;min-width:0;}
.sb-name{font-size:13px;font-weight:500;color:var(--fg2);transition:color .15s;}
.sb-count{
  font-family:'DM Mono',monospace;font-size:9.5px;
  color:color-mix(in srgb,var(--subj-color) 80%,var(--fg3));
  background:color-mix(in srgb,var(--subj-color) 12%,var(--surface2));
  border:1px solid color-mix(in srgb,var(--subj-color) 38%,var(--border2));
  padding:2px 7px;border-radius:9px;transition:all .18s;
}
.subj-block.active .sb-count{
  color:var(--subj-color);
  background:color-mix(in srgb,var(--subj-color) 20%,var(--surface2));
  border-color:color-mix(in srgb,var(--subj-color) 60%,transparent);
  box-shadow:0 0 8px color-mix(in srgb,var(--subj-color) 30%,transparent);
}


/* ── RIGHT PANEL ── */
.panel{display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}

/* ── INFOBAR — exact viewer-infobar from resource.html ── */
.panel-infobar{
  display:flex;align-items:center;gap:10px;padding:0 20px;height:44px;
  background:color-mix(in srgb,var(--accent) 4%,var(--bg2));
  border-bottom:1px solid color-mix(in srgb,var(--accent) 12%,var(--border));
  flex-shrink:0;min-width:0;transition:background .35s,border-color .35s;
  position:relative;
}
.pi-icon{font-size:18px;flex-shrink:0;}
.pi-title{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--fg);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pi-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--fg3);flex-shrink:0;}
.pi-chips{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.pi-chip{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;background:var(--surface2);color:var(--fg2);border:1px solid var(--border2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}

/* ── PANEL BODY ── */
.panel-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 22px 32px;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.panel-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;}
.panel-empty-h{font-family:'Lora',serif;font-style:italic;font-size:18px;color:var(--fg2);}
.panel-empty-s{font-family:'DM Mono',monospace;font-size:11px;color:var(--fg3);opacity:.7;}

/* ── CARD GRID ── */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}

/* ── CHANNEL CARD ── */
.ch-card{
  border-radius:10px;border:1px solid var(--border2);
  background:var(--bg2);overflow:hidden;
  display:flex;flex-direction:column;
  transition:border-color .18s,box-shadow .18s,background .18s;
  animation:cardIn .22s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ch-card:hover{
  border-color:color-mix(in srgb,var(--subj-color,var(--accent)) 40%,transparent);
  background:var(--surface);
  box-shadow:0 4px 24px rgba(0,0,0,.35),
             0 0 0 1px color-mix(in srgb,var(--subj-color,transparent) 15%,transparent);
}

/* COVER */
.cc-cover{width:100%;aspect-ratio:16/6;position:relative;overflow:hidden;flex-shrink:0;}
.cc-cover svg,.cc-cover img.banner{width:100%;height:100%;display:block;object-fit:cover;}
.cc-cover img.banner{position:absolute;inset:0;}
.cc-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(21,23,20,.9) 100%);}
/* TOP badge */
.cc-top{position:absolute;top:8px;left:9px;z-index:2;font-family:'DM Mono',monospace;font-size:7.5px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(122,184,106,.88);color:#071207;letter-spacing:.4px;}
/* rank */
.cc-rank{position:absolute;top:8px;right:9px;z-index:2;font-family:'DM Mono',monospace;font-size:8px;font-weight:700;padding:2px 8px;border-radius:4px;border:1px solid;background:rgba(21,23,20,.72);backdrop-filter:blur(4px);}
.cr-1{border-color:rgba(245,200,66,.5);color:#f5c842;}
.cr-2{border-color:rgba(192,190,184,.4);color:#c0beb8;}
.cr-3{border-color:rgba(205,127,50,.4);color:#cd7f32;}
.cr-n{border-color:var(--border2);color:var(--fg4);}
/* avatar + name over cover */
.cc-av{position:absolute;bottom:10px;left:12px;z-index:2;width:38px;height:38px;border-radius:8px;border:2px solid rgba(255,255,255,.14);overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 10px rgba(0,0,0,.5);}
.cc-av img{width:100%;height:100%;object-fit:cover;}
.cc-cover-name{position:absolute;bottom:13px;left:58px;right:10px;z-index:2;font-size:13.5px;font-weight:600;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* BODY */
.cc-body{padding:10px 14px 0;display:flex;flex-direction:column;gap:0;flex:1;}
.cc-handle{font-family:'DM Mono',monospace;font-size:9px;color:var(--fg4);margin-bottom:6px;}
.cc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.cc-tag{font-family:'DM Mono',monospace;font-size:7.5px;padding:2px 6px;border-radius:3px;background:var(--surface2);border:1px solid var(--border2);color:var(--fg3);text-transform:uppercase;letter-spacing:.3px;}
.cc-tag.t-top{background:rgba(122,184,106,.1);border-color:rgba(122,184,106,.22);color:var(--accent);}
.cc-tag.t-pyq{background:var(--amber-lo);border-color:rgba(212,168,75,.2);color:var(--amber);}
.cc-desc{font-size:12px;color:var(--fg3);line-height:1.65;margin-bottom:8px;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* MOTTO — tinted accent left border like resource.html subject rows */
.cc-motto{
  font-family:'DM Mono',monospace;font-size:9px;font-style:italic;
  color:var(--fg4);line-height:1.6;padding:7px 10px;
  border-left:2px solid var(--subj-color,var(--accent));
  background:color-mix(in srgb,var(--subj-color,var(--accent)) 5%,transparent);
  border-radius:0 5px 5px 0;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

/* ── COMMUNITY RATING ZONE — cyan tinted ── */
.cc-co-zone{
  border-top:1px solid var(--border);
  padding:9px 14px 10px;
  background:rgba(95,212,232,.03);
  display:flex;flex-direction:column;gap:5px;
}
.cc-co-zone:hover{background:rgba(95,212,232,.06);}
.cc-co-lbl{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:8.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(95,212,232,.7);}
.cc-co-score{margin-left:auto;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--cyan);}
.co-bar-row{display:flex;align-items:center;gap:7px;}
.co-bar{height:4px;border-radius:2px;background:rgba(95,212,232,.1);overflow:hidden;flex:1;}
.co-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan),rgba(95,212,232,.4));transition:width .45s;}
.co-votes{font-family:'DM Mono',monospace;font-size:8.5px;color:rgba(95,212,232,.4);flex-shrink:0;}

/* half-stars */
.hs-wrap{display:flex;gap:3px;align-items:center;}
.hs{position:relative;width:20px;height:20px;flex-shrink:0;cursor:pointer;transition:transform .1s;}
.hs:hover{transform:scale(1.2);}
.hs svg{position:absolute;inset:0;width:100%;height:100%;}
.hs .hbg{fill:rgba(95,212,232,.1);}
.hs .hl{fill:#f5c842;clip-path:inset(0 50% 0 0);}
.hs .hr{fill:#f5c842;clip-path:inset(0 0 0 50%);}
.hs .hf{fill:#f5c842;}
.hs[data-s="0"] .hl,.hs[data-s="0"] .hr,.hs[data-s="0"] .hf{opacity:0;}
.hs[data-s="0"] .hbg{fill:rgba(95,212,232,.12);}
.hs[data-s="h"] .hl{opacity:1;}.hs[data-s="h"] .hr{opacity:0;}.hs[data-s="h"] .hf{opacity:0;}
.hs[data-s="f"] .hl{opacity:0;}.hs[data-s="f"] .hr{opacity:0;}.hs[data-s="f"] .hf{opacity:1;}
.hs-wrap.ro .hs{cursor:default;pointer-events:none;transform:none;}

/* YT link — matches resource.html .tbtn.primary style */
.cc-yt{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 14px;
  border-top:1px solid var(--border);
  color:rgba(255,107,107,.7);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  text-decoration:none;letter-spacing:.3px;
  transition:all .16s;
}
.cc-yt:hover{background:rgba(255,40,40,.07);color:#ff6b6b;}
.cc-yt svg{width:12px;height:12px;flex-shrink:0;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 18px;font-family:'DM Mono',monospace;font-size:11px;color:var(--fg);z-index:9000;white-space:nowrap;animation:toastIn .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.5);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- NAV — exact resource.html structure -->
<nav class="nav">
  <div class="nav-left">
    <div class="nav-brand">
      <div class="nav-brand-mark" id="navMark"></div>
      ISC.exe / Channels
    </div>
    <div class="nav-links">
      <a class="nav-link" href="/">← Home</a>
      <a class="nav-link" href="resource.html">
        <span class="nav-link-pip" id="navPip"></span>
        Resources
      </a>
    </div>
  </div>
  <div class="nav-right"></div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-heading">Best YouTube<br>Channels to Learn</div>
      <div class="sidebar-sub">ISC 2026 · handpicked · ranked</div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-commerce" onclick="setStream('commerce')">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--amber);opacity:.7;flex-shrink:0;transition:opacity .2s"></span>
        📊 Commerce
      </button>
      <button class="tab" id="tab-science" onclick="setStream('science')">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--cyan);opacity:.4;flex-shrink:0;transition:opacity .2s"></span>
        🔬 Science
      </button>
    </div>
    <div id="subjList"></div>
  </aside>

  <!-- PANEL -->
  <section class="panel">
    <div class="panel-infobar" id="panelInfobar">
      <span class="pi-icon" id="piIcon">📺</span>
      <span class="pi-title" id="piTitle">Select a subject</span>
      <span class="pi-sub" id="piSub">choose from the sidebar</span>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="panel-empty" id="panelEmpty">
        <div style="font-size:36px;opacity:.2;animation:bob 3.5s ease-in-out infinite">📺</div>
        <div class="panel-empty-h">Nothing open yet</div>
        <div class="panel-empty-s">pick a subject from the sidebar</div>
      </div>
      <div class="ch-grid" id="chGrid" style="display:none;"></div>
    </div>
  </section>
</div>
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

<script>
// ━━ TEACHER IMAGES — only edit this block ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const TEACHER_IMAGES = {

// SVG patterns
const SP='M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z';
function makeSVG(pat,color,bg,w=400,h=150){
  const c=color,b=bg||'#111210';
  const rg=`<defs><radialGradient id="rg" cx="40%" cy="50%"><stop offset="0%" stop-color="${c}" stop-opacity=".14"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/></radialGradient></defs>`;
  const base=`<rect width="${w}" height="${h}" fill="${b}"/>${rg}<rect width="${w}" height="${h}" fill="url(#rg)"/>`;
  const cx=w/2,cy=h/2;
  const F={
    circuit(){const pts=[[w*.05,h*.3],[w*.22,h*.3],[w*.22,h*.6],[w*.48,h*.6],[w*.48,h*.25],[w*.72,h*.25],[w*.72,h*.7],[w*.93,h*.7]];const l=pts.slice(0,-1).map((_,i)=>`<line x1="${pts[i][0].toFixed()}" y1="${pts[i][1].toFixed()}" x2="${pts[i+1][0].toFixed()}" y2="${pts[i+1][1].toFixed()}" stroke="${c}" stroke-width="1.4" opacity=".4"/>`).join('');const n=pts.map((p,i)=>`<circle cx="${p[0].toFixed()}" cy="${p[1].toFixed()}" r="${i%2===0?3.5:2}" fill="${c}" opacity="${i%2===0?.7:.35}"/>`).join('');return l+n;},
    hexagons(){const hex=(px,py,r)=>{const p=[];for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;p.push(`${(px+r*Math.cos(a)).toFixed(1)},${(py+r*Math.sin(a)).toFixed(1)}`);}return`<polygon points="${p.join(' ')}" fill="none" stroke="${c}" stroke-width="1" opacity=".28"/>`;};return[w*.12,w*.33,w*.54,w*.75,w*.92].map((px,i)=>[h*.32,h*.75].map(py=>hex(px,py+(i%2?.5:0)*h*.22,h*.18))).flat().join('');},
    dots(){let d='';for(let xi=0;xi<=13;xi++)for(let yi=0;yi<=5;yi++){const px=xi*(w/13),py=yi*(h/5);d+=`<circle cx="${px.toFixed()}" cy="${py.toFixed()}" r="${(xi+yi)%5<1?3:1.4}" fill="${c}" opacity="${(.05+Math.abs(Math.sin(xi*yi*.2))*.14).toFixed(2)}"/>`;}return d;},
    waves(){return[h*.2,h*.38,h*.55,h*.72,h*.88].map((y,i)=>`<path d="M0,${y.toFixed()} ${[...Array(14)].map((_,j)=>`Q${((j+.5)*w/13).toFixed()},${(y-(h*.08+i*3)).toFixed()} ${((j+1)*w/13).toFixed()},${y.toFixed()}`).join(' ')}" fill="none" stroke="${c}" stroke-width="${i===2?2:1}" opacity="${[.15,.25,.44,.25,.12][i]}"/>`).join('');},
    triangles(){const t=(px,py,s,op)=>`<polygon points="${px.toFixed()},${(py-s).toFixed()} ${(px-s*.86).toFixed()},${(py+s*.5).toFixed()} ${(px+s*.86).toFixed()},${(py+s*.5).toFixed()}" fill="none" stroke="${c}" stroke-width="1" opacity="${op}"/>`;return t(w*.2,cy,h*.3,.44)+t(w*.2,cy,h*.17,.2)+t(w*.62,cy*.7,h*.34,.38)+t(w*.82,h*.75,h*.2,.3);},
    grid(){let g='';for(let x=0;x<=w;x+=w/12)g+=`<line x1="${x.toFixed()}" y1="0" x2="${x.toFixed()}" y2="${h}" stroke="${c}" stroke-width=".5" opacity=".12"/>`;for(let y=0;y<=h;y+=h/6)g+=`<line x1="0" y1="${y.toFixed()}" x2="${w}" y2="${y.toFixed()}" stroke="${c}" stroke-width=".5" opacity=".12"/>`;return g+`<circle cx="${cx}" cy="${cy}" r="${(h*.28).toFixed()}" fill="none" stroke="${c}" stroke-width="1.2" opacity=".28"/><circle cx="${cx}" cy="${cy}" r="4" fill="${c}" opacity=".55"/>`;},
    lines(){return[h*.15,h*.28,h*.42,h*.56,h*.7,h*.84].map((y,i)=>`<line x1="0" y1="${y.toFixed()}" x2="${w}" y2="${y.toFixed()}" stroke="${c}" stroke-width="${i===2?2.2:1}" opacity="${[.12,.18,.44,.18,.12,.08][i]}"/>`).join('');},
    cells(){const cl=(px,py,r,op)=>`<circle cx="${px.toFixed()}" cy="${py.toFixed()}" r="${r.toFixed()}" fill="none" stroke="${c}" stroke-width="1" opacity="${op}"/>`;return cl(w*.28,cy,h*.32,.38)+cl(w*.28,cy,h*.18,.2)+cl(w*.28,cy,h*.07,.5)+cl(w*.68,cy*.65,h*.22,.3);},
  };
  return`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">${base}${(F[pat]||F.dots)()}</svg>`;
}

let stream='commerce',activeGroup=null;

function setStream(s){
  stream=s;
  const tc=document.getElementById('tab-commerce');
  const ts=document.getElementById('tab-science');
  tc.className='tab'+(s==='commerce'?' active':'');
  ts.className='tab'+(s==='science'?' active':'');
  // dot opacity
  tc.querySelector('span').style.opacity=s==='commerce'?'1':'.4';
  ts.querySelector('span').style.opacity=s==='science'?'1':'.4';
  // tab colour class
  if(s==='commerce'){tc.classList.remove('active');tc.classList.add('active');ts.classList.remove('active');}
  tc.id='tab-commerce'; ts.id='tab-science';
  activeGroup=null;
  renderSubjects();
  showEmpty();
}

function renderSubjects(){
  const wrap=document.getElementById('subjList');
  wrap.innerHTML='';
  (DATA[stream]||[]).forEach(g=>{
    const b=document.createElement('div');
    b.className='subj-block'+(activeGroup&&activeGroup.subject===g.subject?' active':'');
    b.style.setProperty('--subj-color',g.color);
    const countEl=`<span class="sb-count">${g.channels.length}</span>`;
    b.innerHTML=`<span class="sb-icon">${g.icon}</span><span class="sb-name">${g.subject}</span>${countEl}`;
    b.onclick=()=>selectSubject(g,b);
    wrap.appendChild(b);
  });
}

function selectSubject(g,block){
  document.querySelectorAll('.subj-block').forEach(b=>b.classList.remove('active'));
  block.classList.add('active');
  activeGroup=g;
  // infobar
  document.getElementById('piIcon').textContent=g.icon;
  document.getElementById('piTitle').textContent=g.subject;
  document.getElementById('piSub').textContent=`${g.channels.length} channels`;
  // tint infobar like resource.html viewer-infobar
  const ib=document.getElementById('panelInfobar');
  ib.style.background=`color-mix(in srgb,${g.color} 7%,var(--bg2))`;
  ib.style.borderBottomColor=`color-mix(in srgb,${g.color} 20%,var(--border))`;
  renderGrid(g);
}

function showEmpty(){
  document.getElementById('panelEmpty').style.display='flex';
  document.getElementById('chGrid').style.display='none';
  document.getElementById('piIcon').textContent='📺';
  document.getElementById('piTitle').textContent='Select a subject';
  document.getElementById('piSub').textContent='choose from the sidebar';
  const ib=document.getElementById('panelInfobar');
  ib.style.background='';ib.style.borderBottomColor='';
}

function renderGrid(g){
  const grid=document.getElementById('chGrid');
  document.getElementById('panelEmpty').style.display='none';
  grid.style.display='grid';
  grid.innerHTML='';
  rankSort(g.channels,g.channels).forEach((ch,idx)=>grid.appendChild(mkCard(ch,g,idx)));
}

function mkCard(ch,g,idx){
  const ca=cAvg(ch.id),cc=cCnt(ch.id),sc=combined(ch.id);
  const card=document.createElement('div');
  card.className='ch-card';
  card.style.setProperty('--subj-color',g.color);
  card.style.animationDelay=(idx*.05)+'s';

  // cover
  const cover=document.createElement('div');cover.className='cc-cover';
  cover.innerHTML=makeSVG(ch.pat,g.color,g.bg);
  const bn=getBanner(ch.id);
  if(bn){const bi=document.createElement('img');bi.className='banner';bi.src=bn;bi.alt='';bi.onerror=()=>bi.remove();cover.appendChild(bi);}
  if(ch.isTop){const tb=document.createElement('div');tb.className='cc-top';tb.textContent='★ TOP';cover.appendChild(tb);}
  if(sc>0){const rb=document.createElement('div');rb.className='cc-rank '+rankCls(idx);rb.textContent=rankEmoji(idx)+' '+sc.toFixed(1);cover.appendChild(rb);}
  const av=document.createElement('div');av.className='cc-av';av.textContent=ch.av;
  const avU=getAvatar(ch.id);if(avU)applyAvatar(av,avU);
  cover.appendChild(av);
  const cnm=document.createElement('div');cnm.className='cc-cover-name';cnm.textContent=ch.name;
  cover.appendChild(cnm);
  card.appendChild(cover);

  // body
  const body=document.createElement('div');body.className='cc-body';
  body.innerHTML=`<div class="cc-handle">${ch.handle}</div>`;
  const tags=document.createElement('div');tags.className='cc-tags';
  ch.tags.slice(0,3).forEach(t=>{const s=document.createElement('span');s.className='cc-tag'+(t==='TOP PICK'?' t-top':t.includes('PYQ')||t.includes('Maha')?' t-pyq':'');s.textContent=t;tags.appendChild(s);});
  body.appendChild(tags);
  const desc=document.createElement('div');desc.className='cc-desc';desc.textContent=ch.desc;body.appendChild(desc);
  const motto=MOTTOS[ch.id];
  if(motto){const m=document.createElement('div');m.className='cc-motto';m.style.setProperty('--subj-color',g.color);m.textContent=motto;body.appendChild(m);}
  card.appendChild(body);

  // community rating zone
  const zone=document.createElement('div');zone.className='cc-co-zone';
  buildCoZone(zone,ch.id,ca,cc);
  card.appendChild(zone);

  // YT link
  const yt=document.createElement('a');yt.className='cc-yt';
  yt.href=ch.url;yt.target='_blank';yt.rel='noopener noreferrer';
  yt.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>Watch on YouTube`;
  card.appendChild(yt);
  return card;
}

function buildCoZone(zone,id,avg,cnt){
  zone.innerHTML='';
  const lbl=document.createElement('div');lbl.className='cc-co-lbl';
  lbl.innerHTML='◎ <span>Community Rating</span>';
  const bigSc=document.createElement('span');bigSc.className='cc-co-score';bigSc.id='ccs-'+id;
  bigSc.textContent=avg>0?fmt(avg):'—';
  lbl.appendChild(bigSc);
  zone.appendChild(lbl);
  const barRow=document.createElement('div');barRow.className='co-bar-row';
  const bar=document.createElement('div');bar.className='co-bar';
  const fill=document.createElement('div');fill.className='co-fill';fill.id='ccf-'+id;fill.style.width=(avg>0?(avg/5)*100:0)+'%';
  bar.appendChild(fill);barRow.appendChild(bar);
  const votes=document.createElement('span');votes.className='co-votes';votes.id='ccv-'+id;
  votes.textContent=cnt?cnt+' vote'+(cnt!==1?'s':''):'no votes';
  barRow.appendChild(votes);
  zone.appendChild(barRow);
  const stars=mkStars(id,prevVote(id)||0);
  zone.appendChild(stars);
  const hint=document.createElement('div');
  hint.style.cssText='font-family:"DM Mono",monospace;font-size:8.5px;color:rgba(95,212,232,.4);margin-top:1px;';
  const pv=prevVote(id);
  hint.textContent=pv>0?`✓ your vote: ${fmt(pv)} · update anytime`:'hover left/right half for half stars';
  zone.appendChild(hint);
}

function mkStars(id,val){
  const wrap=document.createElement('div');wrap.className='hs-wrap';wrap.dataset.saved=val;
  for(let i=1;i<=5;i++){
    const star=document.createElement('div');star.className='hs';
    star.innerHTML=`<svg viewBox="0 0 24 24"><path class="hbg" d="${SP}"/><path class="hl" d="${SP}"/><path class="hr" d="${SP}"/><path class="hf" d="${SP}"/></svg>`;
    star.dataset.s=val>=i?'f':val>=i-.5?'h':'0';
    star.addEventListener('mousemove',e=>{const r=star.getBoundingClientRect();const hv=(e.clientX-r.left)<r.width/2?i-.5:i;wrap.querySelectorAll('.hs').forEach((s,j)=>s.dataset.s=hv>=j+1?'f':hv>=j+.5?'h':'0');});
    star.addEventListener('mouseleave',()=>{const sv2=parseFloat(wrap.dataset.saved||'0');wrap.querySelectorAll('.hs').forEach((s,j)=>s.dataset.s=sv2>=j+1?'f':sv2>=j+.5?'h':'0');});
    star.addEventListener('click',e=>{
      const r=star.getBoundingClientRect();const clicked=(e.clientX-r.left)<r.width/2?i-.5:i;
      wrap.dataset.saved=clicked;
      addCom(id,clicked);
      const ca=cAvg(id),cc2=cCnt(id);
      const fill=document.getElementById('ccf-'+id);if(fill)fill.style.width=((ca/5)*100)+'%';
      const sc=document.getElementById('ccs-'+id);if(sc)sc.textContent=fmt(ca);
      const vt=document.getElementById('ccv-'+id);if(vt)vt.textContent=cc2+' vote'+(cc2!==1?'s':'');
      // update hint
      const zoneEl=wrap.closest('.cc-co-zone');
      if(zoneEl){const h=zoneEl.querySelector('div:last-child');if(h)h.textContent=`✓ your vote: ${fmt(clicked)} · update anytime`;}
      toast('◎ Voted '+fmt(clicked)+' / 5 — thanks!');
    });
    wrap.appendChild(star);
  }
  return wrap;
}

function toast(msg){
  const o=document.querySelector('.toast');if(o)o.remove();
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),320);},2600);
}

// Init — apply saved theme accent to nav mark
(function initTheme(){
  const mark=document.getElementById('navMark');
  const pip=document.getElementById('navPip');
  const s=localStorage.getItem('isc-accent');
  const g=localStorage.getItem('isc-gradient');
  if(g){const gr=JSON.parse(g);if(mark){mark.style.background=`linear-gradient(135deg,${gr.a},${gr.b})`;mark.style.boxShadow=`0 0 8px ${gr.a}`;}if(pip)pip.style.background=gr.a;}
  else if(s){if(mark){mark.style.background=s;mark.style.boxShadow=`0 0 8px ${s}`;}if(pip)pip.style.background=s;}
})();

// set active tab classes properly
document.getElementById('tab-commerce').classList.add('active');
renderSubjects();
</script>
