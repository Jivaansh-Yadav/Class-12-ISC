<script>

/* ══════════════════════════════════════════════════════
   AUTO YOUTUBE IMAGE FALLBACK (ADDED)
══════════════════════════════════════════════════════ */

function getHandle(channel){
  return (channel.handle || "").replace("@","");
}

function getAvatar(channel){
  if(channel.avatarUrl && !channel.avatarUrl.startsWith("data:")){
    return channel.avatarUrl;
  }
  return `https://unavatar.io/youtube/${getHandle(channel)}`;
}

function getBanner(channel){
  if(channel.bannerUrl && channel.bannerUrl.trim() !== ""){
    return channel.bannerUrl;
  }
  return `https://unavatar.io/youtube/${getHandle(channel)}`;
}

/* ══════════════════════════════════════════════════════
   ORIGINAL SYSTEM (UNCHANGED EXCEPT mkCard)
══════════════════════════════════════════════════════ */

let DATA = { commerce: [], science: [] };
let stream = 'commerce';
let activeGroup = null;
let subjectFilter = '';

async function loadChannels() {
  try {
    const res = await fetch('channels.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    DATA = await res.json();
  } catch (err) {
    console.warn('channels.json fetch failed:', err);
    document.getElementById('subjList').innerHTML = `
      <div class="sidebar-error">
        ⚠ Could not load <code>channels.json</code>.
      </div>`;
    return;
  }
  DATA.commerce = DATA.commerce || [];
  DATA.science  = DATA.science  || [];

  renderSubjects();
  fetchAllVotes().then(() => { 
    if (activeGroup) renderGrid(activeGroup); 
    renderSubjects(); 
  });
}

/* ══ APPLY AVATAR HELPER (UNCHANGED) ══ */
function applyAvatar(el, url) {
  if (!url) return;
  el.textContent = '';
  const img = document.createElement('img');
  img.src = url;
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
  img.onerror = () => img.remove();
  el.appendChild(img);
}

/* ══════════════════════════════════════════════════════
   🔥 UPDATED mkCard (ONLY IMPORTANT CHANGE)
══════════════════════════════════════════════════════ */

function mkCard(ch, g, idx) {

  const card = document.createElement('div');
  card.className='ch-card';

  const cover = document.createElement('div');
  cover.className='cc-cover';

  /* ✅ ALWAYS LOAD BANNER */
  const bi=document.createElement('img');
  bi.className='banner';
  bi.src=getBanner(ch);
  bi.alt='';
  bi.onerror=()=>bi.remove();
  cover.appendChild(bi);

  if (ch.isTop) {
    const tb=document.createElement('div');
    tb.className='cc-top';
    tb.textContent='★ TOP';
    cover.appendChild(tb);
  }

  /* ✅ FIXED AVATAR */
  const av=document.createElement('div');
  av.className='cc-av';
  applyAvatar(av, getAvatar(ch));
  cover.appendChild(av);

  const cnm=document.createElement('div');
  cnm.className='cc-cover-name';
  cnm.textContent=ch.name;
  cover.appendChild(cnm);

  card.appendChild(cover);

  const body=document.createElement('div');
  body.className='cc-body';

  body.innerHTML = `
    <div class="cc-handle">${ch.handle||''}</div>
  `;

  const desc=document.createElement('div');
  desc.className='cc-desc';
  desc.textContent=ch.desc||'';
  body.appendChild(desc);

  card.appendChild(body);

  const yt=document.createElement('a');
  yt.className='cc-yt';
  yt.href=ch.url||'#';
  yt.target='_blank';
  yt.rel='noopener noreferrer';
  yt.innerText='WATCH ON YOUTUBE';

  card.appendChild(yt);

  return card;
}

/* ══════════════════════════════════════════════════════
   REST OF YOUR SYSTEM (UNCHANGED)
══════════════════════════════════════════════════════ */

function renderSubjects(){
  const wrap = document.getElementById('subjList');
  wrap.innerHTML = '';

  (DATA[stream]||[]).forEach(g=>{
    const b=document.createElement('div');
    b.className='subj-item';
    b.innerHTML = g.subject;
    b.onclick = ()=>selectSubject(g);
    wrap.appendChild(b);
  });
}

function selectSubject(g){
  activeGroup=g;
  renderGrid(g);
}

function renderGrid(g){
  const grid=document.getElementById('chGrid');
  grid.innerHTML='';
  grid.style.display='grid';

  (g.channels||[]).forEach((ch,idx)=>{
    grid.appendChild(mkCard(ch,g,idx));
  });
}

/* ══════════════════════════════════════════════════════ */

loadChannels();
</script>
</body>
</html>
